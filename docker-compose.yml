version: '3.9'

services:
  # Site FerriBor (Next.js)
  site:
    build:
      context: ./Site
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - ferribor

  # CRM Admin (Vite build → servido via Caddy)
  crm:
    build:
      context: ./CRM com IA/admin
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    restart: unless-stopped
    networks:
      - ferribor

  # Evolution API (WhatsApp Web)
  evolution:
    image: atendai/evolution-api:latest
    ports:
      - "8085:8080"
    environment:
      - AUTHENTICATION_API_KEY=ferribor_evo_2026
      - AUTHENTICATION_INSTANCE_MODE=container
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://postgres:postgres@db:5432/evolution
    volumes:
      - evolution_data:/evolution/store
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - ferribor

  # PostgreSQL (usado pelo Evolution)
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=evolution
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - ferribor

  # Caddy (reverse proxy + SSL automático em produção)
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - site
      - crm
      - evolution
    restart: unless-stopped
    networks:
      - ferribor

volumes:
  evolution_data:
  pg_data:
  caddy_data:
  caddy_config:

networks:
  ferribor:
    driver: bridge
